spring.application.name=PartTimeHR

# DB (운영에서는 환경변수로 주입)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/parttime_hr}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# datasource
spring.jpa.defer-datasource-initialization=true

# JWT (운영에서는 반드시 JWT_SECRET 환경변수로 교체)
jwt.secret=${JWT_SECRET:secret-key-for-hs256-part-timeHR-project}
jwt.expiration=${JWT_EXPIRATION:86400000}

# SMTP - MAIL_PASSWORD 환경변수 필수 (앱 비밀번호를 코드에 커밋하지 말 것)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dh655933@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 최저임금 (원/시간) - 매년 고시값으로 갱신할 것
payroll.minimum-wage=${MINIMUM_WAGE:10320}

# 4대보험 근로자 부담 요율 - 매년 고시값으로 갱신할 것 (소수 = 비율)
# 장기요양보험은 건강보험료에 곱하는 요율
insurance.national-pension-rate=${NATIONAL_PENSION_RATE:0.045}
insurance.health-rate=${HEALTH_INSURANCE_RATE:0.03545}
insurance.long-term-care-rate=${LONG_TERM_CARE_RATE:0.1295}
insurance.employment-rate=${EMPLOYMENT_INSURANCE_RATE:0.009}

# 인증 메일 링크의 기준 URL - 백엔드 (배포 시 APP_BASE_URL로 교체)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# 비밀번호 재설정 페이지의 기준 URL - 프론트엔드
# (재설정은 새 비밀번호 입력 폼이 필요해 프론트 페이지로 보낸다)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
